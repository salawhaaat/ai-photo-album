<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Photo Album</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body { padding: 30px; background: #f0f2f5; }
    h1 { font-weight: 700; }
    .card { border: none; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    #results img {
      max-width: 200px;
      max-height: 200px;
      object-fit: cover;
      margin: 8px;
      border-radius: 8px;
      border: 2px solid #dee2e6;
    }
    #results .photo-card { text-align: center; display: inline-block; vertical-align: top; }
    .badge { margin: 2px; font-size: 0.7rem; }
  </style>
</head>
<body>
  <div class="container" style="max-width:900px">
    <h1 class="mb-1">AI Photo Album</h1>
    <p class="text-muted mb-4">Upload photos and search them using natural language.</p>

    <!-- Search -->
    <div class="card mb-4 p-4">
      <h5 class="mb-3">Search Photos</h5>
      <div class="input-group">
        <input id="searchInput" type="text" class="form-control form-control-lg"
               placeholder='Try "show me dogs" or "cats and trees"'>
        <button class="btn btn-primary btn-lg" onclick="doSearch()">Search</button>
      </div>
      <small class="text-muted mt-1">Supports single keywords, pairs, or full sentences.</small>
    </div>

    <!-- Upload -->
    <div class="card mb-4 p-4">
      <h5 class="mb-3">Upload Photo</h5>
      <div class="mb-2">
        <label class="form-label">Select image file</label>
        <input id="fileInput" type="file" class="form-control" accept="image/*">
      </div>
      <div class="mb-2">
        <label class="form-label">Custom labels <span class="text-muted">(optional — comma separated)</span></label>
        <input id="customLabels" type="text" class="form-control"
               placeholder="e.g. Sam, birthday party, backyard">
      </div>
      <button class="btn btn-success" onclick="doUpload()">Upload</button>
      <div id="uploadStatus" class="mt-2"></div>
    </div>

    <!-- Results -->
    <div class="card p-4" id="resultsCard" style="display:none">
      <h5 class="mb-3">Results</h5>
      <div id="results"></div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
